server:
  address: 127.0.0.1
  port: 8091

spring:
  application:
    name: execution-worker

ops-agent:
  worker:
    transport-auth:
      enabled: false
      max-clock-skew: 30s
    sql-egress:
      # Local test binding for the SQL workbench smoke flow. Deployment
      # environments must replace this with their own Worker-local catalog.
      allowed-targets:
        - host: localhost
          port: 9092
      connections:
        - connection-id: h2-local-test
          target-environment: test
          platform-type: H2
          host: localhost
          port: 9092
          credential-alias: h2-local-readonly
          enabled: true
    # Configure only through deployment secrets. Empty config fails closed.
    sql-credentials: {}
    http-egress:
      allowed-targets: []
    configured-http-skills:
      skills:
        - skill-id: weather-current-read
          version: 1.0.0
          endpoint-url: ""
          input-parameter-name: location
          query-parameter-name: location
          source: weather-read-model
          timeout: 5s
          allowed-response-fields:
            - location
            - condition
            - temperatureCelsius
            - humidityPercent
            - windSpeedKph
            - observationTime
